<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 80" role="img">
  <title>DevBoard</title>

  <!-- Icon container -->
  <rect x="0" y="0" width="80" height="80" rx="16" fill="#f97316"/>

  <!-- Back card -->
  <rect x="15" y="19" width="46" height="32" rx="5" fill="rgba(255,255,255,0.25)"/>
  <!-- Middle card -->
  <rect x="19" y="24" width="46" height="32" rx="5" fill="rgba(255,255,255,0.55)"/>
  <!-- Front card -->
  <rect x="23" y="29" width="46" height="32" rx="5" fill="rgba(255,255,255,0.95)"/>

  <!-- Content lines on front card -->
  <rect x="31" y="37" width="24" height="3" rx="1.5" fill="#f97316"/>
  <rect x="31" y="44" width="17" height="3" rx="1.5" fill="rgba(249,115,22,0.4)"/>
  <rect x="31" y="51" width="20" height="3" rx="1.5" fill="rgba(249,115,22,0.4)"/>

  <!-- Wordmark -->
  <text x="92" y="50" font-family="system-ui, -apple-system, sans-serif" font-weight="500" font-size="28" fill="#111111">Dev<tspan fill="#f97316">Board</tspan></text>
</svg>